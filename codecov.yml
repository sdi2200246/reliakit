coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
      reliakit-primitives:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-primitives
      reliakit-secret:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-secret
      reliakit-validate:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-validate
      reliakit-collections:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-collections
      reliakit-codec:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-codec
      reliakit-csv:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-csv
      reliakit-backoff:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-backoff
      reliakit-retry:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-retry
      reliakit-bulkhead:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-bulkhead
      reliakit-health:
        target: 95%
        threshold: 1%
        flags:
          - reliakit-health
      reliakit-circuit:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-circuit
      reliakit-ratelimit:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-ratelimit
      reliakit-json:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-json
      reliakit-timeout:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-timeout
      reliakit-core:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-core
      reliakit-decide:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-decide
      # reliakit-derive is a proc-macro crate. Its remaining uncovered lines are
      # the reject branches for unsupported or malformed input (enums, unions,
      # generics, and malformed `#[reliakit(...)]` field attributes), which fail
      # the build and so can only be exercised by the compile-fail harness, where
      # the proc-macro runs in an uninstrumented subprocess. Decisions that can be
      # made on plain data are factored into pure, unit-tested helpers; what
      # remains is token-level detection that needs a `proc_macro::TokenStream`,
      # which cannot be constructed outside a real macro expansion. The target
      # reflects that structural ceiling.
      reliakit-derive:
        target: 85%
        threshold: 1%
        flags:
          - reliakit-derive
    patch:
      default:
        target: 90%
        threshold: 1%
        # reliakit-derive is judged by its own patch status below, at the lower
        # target its proc-macro structural ceiling allows. Exclude it here so the
        # strict default does not also fire on a target it structurally cannot meet.
        paths:
          - "!crates/reliakit-derive/**"
      # See the project note above: the proc-macro reject branches are not
      # coverable without running the macro in an uninstrumented compile-fail
      # subprocess.
      reliakit-derive:
        target: 85%
        threshold: 1%
        flags:
          - reliakit-derive

flag_management:
  default_rules:
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
