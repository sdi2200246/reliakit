coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
      reliakit-primitives:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-primitives
      reliakit-secret:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-secret
      reliakit-validate:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-validate
      reliakit-collections:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-collections
      reliakit-codec:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-codec
      reliakit-backoff:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-backoff
      reliakit-bulkhead:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-bulkhead
      reliakit-circuit:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-circuit
      reliakit-ratelimit:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-ratelimit
      reliakit-json:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-json
      reliakit-timeout:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-timeout
      reliakit-core:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-core
      reliakit-decide:
        target: 90%
        threshold: 1%
        flags:
          - reliakit-decide
      # reliakit-derive is a proc-macro crate. Its remaining uncovered lines are
      # the `compile_error!` branches for unsupported input (enums, unions,
      # generics), which can only be exercised by a compile-fail harness such as
      # trybuild — a third-party dev-dependency the workspace forbids. The
      # coverable surface (every supported struct shape) is fully tested, so the
      # target reflects that structural ceiling.
      reliakit-derive:
        target: 85%
        threshold: 1%
        flags:
          - reliakit-derive
    patch:
      default:
        target: 90%
        threshold: 1%
      # See the project note above: the proc-macro error branches are not
      # coverable without a forbidden third-party harness.
      reliakit-derive:
        target: 85%
        threshold: 1%
        flags:
          - reliakit-derive

flag_management:
  default_rules:
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
