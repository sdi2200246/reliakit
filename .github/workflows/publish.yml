# Publish individual crates to crates.io on version tag push.
# Usage: git tag reliakit-primitives-v0.2.4 && git push origin reliakit-primitives-v0.2.4
#
# Authentication uses crates.io Trusted Publishing via GitHub Actions OIDC:
# each job requests a short-lived token with rust-lang/crates-io-auth-action
# and never reads a long-lived API token secret. The "crates-io-publish"
# environment must be configured on each crate's Trusted Publisher on crates.io.
#
# Publish leaf crates before dependents: reliakit-primitives must be published
# before reliakit-codec (codec has an optional dependency on it). All other
# intra-workspace references are dev-dependencies and do not constrain order.

name: Publish

on:
  push:
    tags:
      - "reliakit-primitives-v*"
      - "reliakit-secret-v*"
      - "reliakit-validate-v*"
      - "reliakit-collections-v*"
      - "reliakit-codec-v*"
      - "reliakit-csv-v*"
      - "reliakit-backoff-v*"
      - "reliakit-retry-v*"
      - "reliakit-bulkhead-v*"
      - "reliakit-health-v*"
      - "reliakit-circuit-v*"
      - "reliakit-ratelimit-v*"
      - "reliakit-json-v*"
      - "reliakit-timeout-v*"
      - "reliakit-core-v*"
      - "reliakit-derive-v*"
      - "reliakit-decide-v*"
      - "reliakit-v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-primitives:
    if: startsWith(github.ref, 'refs/tags/reliakit-primitives-v')
    runs-on: ubuntu-latest
    environment: crates-io-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test -p reliakit-primitives --all-features --locked

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          crate=reliakit-primitives
          version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r --arg c "$crate" '.packages[] | select(.name == $c) | .version')"
          index_url="https://index.crates.io/${crate:0:2}/${crate:2:2}/${crate}"
          if curl -sf "$index_url" | jq -e --arg v "$version" 'select(.vers == $v)' >/dev/null; then
            echo "$crate $version is already published on crates.io; skipping."
          else
            echo "Publishing $crate $version to crates.io..."
            cargo publish -p "$crate" --locked
          fi

