name: Coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      # Workaround: codecov's own GPG key URL (keybase.io/codecovsecurity) is
      # currently 404, so codecov-action's CLI signature check fails with
      # "No public key". Pre-import the genuine Codecov Uploader key by
      # fingerprint from a public keyserver so the signature still verifies
      # against the real key (this does not skip verification). Remove once
      # codecov restores its key endpoint.
      - name: Pre-import Codecov signing key
        run: |
          gpg --batch --keyserver keyserver.ubuntu.com \
            --recv-keys 27034E7FDB850E0BBC2C62FF806BB28AED779869 \
          || gpg --batch --keyserver hkps://keys.openpgp.org \
            --recv-keys 27034E7FDB850E0BBC2C62FF806BB28AED779869

      - name: Generate reliakit-primitives coverage
        run: |
          cargo llvm-cov \
            -p reliakit-primitives \
            --all-features \
            --locked \
            --lcov \
            --output-path lcov-reliakit-primitives.info

      - name: Upload reliakit-primitives coverage
        uses: codecov/codecov-action@v7
        with:
          files: lcov-reliakit-primitives.info
          flags: reliakit-primitives
          name: reliakit-primitives
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate reliakit-secret coverage
        run: |
          cargo llvm-cov \
            -p reliakit-secret \
            --all-features \
            --locked \
            --lcov \
