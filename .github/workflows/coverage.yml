name: Coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate reliakit-primitives coverage
        run: |
          cargo llvm-cov \
            -p reliakit-primitives \
            --all-features \
            --locked \
            --lcov \
            --output-path lcov-reliakit-primitives.info

      - name: Upload reliakit-primitives coverage
        uses: codecov/codecov-action@v6
        with:
          files: lcov-reliakit-primitives.info
          flags: reliakit-primitives
          name: reliakit-primitives
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate reliakit-secret coverage
        run: |
          cargo llvm-cov \
            -p reliakit-secret \
            --all-features \
            --locked \
            --lcov \
            --output-path lcov-reliakit-secret.info

      - name: Upload reliakit-secret coverage
        uses: codecov/codecov-action@v6
        with:
          files: lcov-reliakit-secret.info
          flags: reliakit-secret
          name: reliakit-secret
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate reliakit-validate coverage
        run: |
          cargo llvm-cov \
            -p reliakit-validate \
            --all-features \
            --locked \
            --lcov \
            --output-path lcov-reliakit-validate.info

      - name: Upload reliakit-validate coverage
        uses: codecov/codecov-action@v6
        with:
          files: lcov-reliakit-validate.info
          flags: reliakit-validate
          name: reliakit-validate
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate reliakit-collections coverage
        run: |
          cargo llvm-cov \
            -p reliakit-collections \
            --all-features \
            --locked \
            --lcov \
            --output-path lcov-reliakit-collections.info

      - name: Upload reliakit-collections coverage
        uses: codecov/codecov-action@v6
        with:
          files: lcov-reliakit-collections.info
          flags: reliakit-collections
          name: reliakit-collections
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
