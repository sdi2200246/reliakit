# Publish one selected Reliakit crate to crates.io.
#
# This workflow is intentionally manual. Publishing is a release operation, so
# it should not happen automatically on every merge to main.

name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        type: choice
        options:
          - reliakit-primitives
          - reliakit-secret
          - reliakit-validate
          - reliakit-collections

permissions:
  contents: read

concurrency:
  group: manual-publish-${{ inputs.crate }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish ${{ inputs.crate }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.workflow }}-${{ inputs.crate }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.workflow }}-${{ inputs.crate }}-
            ${{ runner.os }}-cargo-

      - name: Verify crates.io token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured." >&2
            exit 1
          fi

      - name: Read crate version
        id: version
        run: |
          set -euo pipefail
          CRATE="${{ inputs.crate }}"
          CARGO_TOML="crates/${CRATE}/Cargo.toml"

          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' "${CARGO_TOML}" | head -1)
          if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Could not parse semver version from ${CARGO_TOML}: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "${CRATE} version: ${VERSION}"

      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 2 \
            --retry-connrefused \
            "https://crates.io/api/v1/crates/${{ inputs.crate }}/${{ steps.version.outputs.version }}" \
            -H "User-Agent: reliakit-manual-publish (github actions)")

          if [ "${STATUS}" = "200" ]; then
            echo "${{ inputs.crate }} v${{ steps.version.outputs.version }} is already published." >&2
            exit 1
          fi

          if [ "${STATUS}" != "404" ]; then
            echo "Unexpected crates.io status while checking version: ${STATUS}" >&2
            exit 1
          fi

      - name: Test selected crate
        run: cargo test -p "${{ inputs.crate }}" --all-features --locked

      - name: Package dry run
        run: cargo publish -p "${{ inputs.crate }}" --dry-run --locked

      - name: Publish selected crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p "${{ inputs.crate }}" --locked
