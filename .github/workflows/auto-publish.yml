# Publish one selected Reliakit crate to crates.io.
#
# This workflow is intentionally manual. Publishing is a release operation, so
# it should not happen automatically on every merge to main.

name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        type: choice
        options:
          - reliakit-primitives
          - reliakit-secret
          - reliakit-validate
          - reliakit-collections
          - reliakit-codec
          - reliakit-backoff
          - reliakit-circuit
          - reliakit-ratelimit
          - reliakit-json
          - reliakit-timeout
          - reliakit-core

permissions:
  contents: read

concurrency:
  group: manual-publish-${{ inputs.crate }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish ${{ inputs.crate }}
    runs-on: ubuntu-latest
    environment: crates-io-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.workflow }}-${{ inputs.crate }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.workflow }}-${{ inputs.crate }}-
            ${{ runner.os }}-cargo-

      - name: Read crate version
        id: version
        run: |
          set -euo pipefail
          CRATE="${{ inputs.crate }}"
          CARGO_TOML="crates/${CRATE}/Cargo.toml"

          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' "${CARGO_TOML}" | head -1)
          if ! echo "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Could not parse semver version from ${CARGO_TOML}: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "${CRATE} version: ${VERSION}"

      - name: Ensure version is not already published
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 2 \
            --retry-connrefused \
            "https://crates.io/api/v1/crates/${{ inputs.crate }}/${{ steps.version.outputs.version }}" \
            -H "User-Agent: reliakit-manual-publish (github actions)")

          if [ "${STATUS}" = "200" ]; then
            echo "${{ inputs.crate }} v${{ steps.version.outputs.version }} is already published." >&2
            exit 1
          fi

          if [ "${STATUS}" != "404" ]; then
            echo "Unexpected crates.io status while checking version: ${STATUS}" >&2
            exit 1
          fi

      - name: Test selected crate
        run: cargo test -p "${{ inputs.crate }}" --all-features --locked

      - name: Package dry run
        run: cargo publish -p "${{ inputs.crate }}" --dry-run --locked

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1

      - name: Publish selected crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p "${{ inputs.crate }}" --locked
