name: Release

on:
  push:
    tags:
      # Every crate-specific release tag (`reliakit-<crate>-v<version>`) and the
      # umbrella's own tag (`reliakit-v<version>`).
      - "reliakit-*-v*"
      - "reliakit-v*"

# Least privilege at the top level; the release job opts into the write access
# it needs. This workflow does not publish to crates.io.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    runs-on: ubuntu-latest
    # GitHub release creation requires write access to repository contents.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --all-features --locked

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag##*-v}"
          crate="${tag%-v*}"
          awk -v crate="$crate" -v ver="$version" '
            index($0, "## " crate " " ver " ") == 1 { flag = 1; next }
            flag && /^## / { flag = 0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! grep -q "[^[:space:]]" RELEASE_NOTES.md; then
            printf "See [CHANGELOG.md](CHANGELOG.md) for details.\n" > RELEASE_NOTES.md
          fi
          echo "name=$crate $version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          name: ${{ steps.notes.outputs.name }}
          body_path: RELEASE_NOTES.md
