name: Publish Dry Run

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Verify reliakit-primitives package
        run: cargo publish -p reliakit-primitives --dry-run --locked

      - name: Verify reliakit-secret package
        run: cargo publish -p reliakit-secret --dry-run --locked

      - name: Verify reliakit-validate package
        run: cargo publish -p reliakit-validate --dry-run --locked

      - name: Verify reliakit-collections package
        run: cargo publish -p reliakit-collections --dry-run --locked

      - name: Verify reliakit-codec package
        run: cargo publish -p reliakit-codec --dry-run --locked

      - name: Verify reliakit-csv package
        run: cargo publish -p reliakit-csv --dry-run --locked

      - name: Verify reliakit-backoff package
        run: cargo publish -p reliakit-backoff --dry-run --locked

      - name: Verify reliakit-retry package
        run: cargo publish -p reliakit-retry --dry-run --locked

      - name: Verify reliakit-bulkhead package
        run: cargo publish -p reliakit-bulkhead --dry-run --locked

      - name: Verify reliakit-health package
        run: cargo publish -p reliakit-health --dry-run --locked

      - name: Verify reliakit-circuit package
        run: cargo publish -p reliakit-circuit --dry-run --locked

      - name: Verify reliakit-ratelimit package
        run: cargo publish -p reliakit-ratelimit --dry-run --locked

      - name: Verify reliakit-json package
        run: cargo publish -p reliakit-json --dry-run --locked

      - name: Verify reliakit-timeout package
        run: cargo publish -p reliakit-timeout --dry-run --locked

      - name: Verify reliakit-core package
        run: cargo publish -p reliakit-core --dry-run --locked

      - name: Verify reliakit-derive package
        run: cargo publish -p reliakit-derive --dry-run --locked

      - name: Verify reliakit-decide package
        run: cargo publish -p reliakit-decide --dry-run --locked

      - name: Verify reliakit package
        run: cargo publish -p reliakit --dry-run --locked
