name: Publish Dry Run

on:
  push:
  pull_request:

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish reliakit-primitives dry run
        run: cargo publish -p reliakit-primitives --dry-run

      - name: Publish reliakit-secret dry run
        run: cargo publish -p reliakit-secret --dry-run
