name: Publish Dry Run

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Verify reliakit-primitives package
        run: cargo publish -p reliakit-primitives --dry-run --locked

      - name: Verify reliakit-secret package
        run: cargo publish -p reliakit-secret --dry-run --locked

      - name: Verify reliakit-validate package
        run: cargo publish -p reliakit-validate --dry-run --locked

      - name: Verify reliakit-collections package
        run: cargo publish -p reliakit-collections --dry-run --locked
