name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Verify Cargo.lock is up to date
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust MSRV
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustc +1.85.0 --version
          cargo +1.85.0 --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Check MSRV
        run: cargo +1.85.0 check --workspace --all-features --locked

  no-std:
    name: no_std
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Check no_std (alloc only)
        run: |
          cargo check -p reliakit-primitives --no-default-features --features alloc --locked
          cargo check -p reliakit-secret --no-default-features --features alloc --locked
          cargo check -p reliakit-validate --no-default-features --features alloc --locked
          cargo check -p reliakit-collections --no-default-features --features alloc --locked
