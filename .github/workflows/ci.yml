name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Verify Cargo.lock is up to date
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Test
        run: cargo test --workspace --all-features --locked

      # Release profile disables debug overflow checks, so the saturating /
      # fallible arithmetic must hold without them. Optimizations can also expose
      # behavior the debug build hides.
      - name: Test (release)
        run: cargo test --workspace --all-features --release --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      # Lint every crate with its default features disabled so a no_std build path
      # cannot regress with a warning that the all-features pass would hide.
      - name: Clippy (no default features)
        run: |
          for pkg in $(cargo metadata --no-deps --format-version 1 \
            | tr ',' '\n' | grep -oE '"reliakit[a-z-]*"' | tr -d '"' \
            | sort -u | grep -v '^reliakit-benches$'); do
            echo "::group::clippy --no-default-features -p $pkg"
            cargo clippy -p "$pkg" --no-default-features --locked -- -D warnings
            echo "::endgroup::"
          done

  # Portability gate: run the test suite across the three major OSes and the
  # stable/beta/nightly channels. The `rust` job above is the canonical
  # fmt/clippy/lint gate on ubuntu+stable, so that combination is excluded here.
  # Nightly is informational (a compiler-side regression there must not block a PR).
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.toolchain == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta, nightly]
        exclude:
          - os: ubuntu-latest
            toolchain: stable
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust ${{ matrix.toolchain }}
        run: |
          rustup toolchain install ${{ matrix.toolchain }} --profile minimal
          rustup default ${{ matrix.toolchain }}
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ matrix.toolchain }}-
            ${{ runner.os }}-cargo-

      - name: Test
        run: cargo test --workspace --all-features --locked

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust MSRV
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustc +1.85.0 --version
          cargo +1.85.0 --version

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Check MSRV
        run: cargo +1.85.0 check --workspace --all-features --locked

  no-std:
    name: no_std
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable with no_std targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add thumbv7em-none-eabi riscv32imac-unknown-none-elf aarch64-unknown-none wasm32-unknown-unknown
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      # Check against real targets with no std available, so a stray `std`
      # dependency cannot slip through (the host target always has std). Covers
      # ARM, RISC-V, AArch64 bare-metal, and WebAssembly.
      - name: Check no_std (alloc only, multiple targets)
        run: |
          for T in thumbv7em-none-eabi riscv32imac-unknown-none-elf aarch64-unknown-none wasm32-unknown-unknown; do
            echo "::group::no_std check for $T"
            cargo check -p reliakit-primitives --no-default-features --features alloc --target "$T" --locked
            cargo check -p reliakit-secret --no-default-features --features alloc --target "$T" --locked
            cargo check -p reliakit-validate --no-default-features --features alloc --target "$T" --locked
            cargo check -p reliakit-collections --no-default-features --features alloc --target "$T" --locked
            cargo check -p reliakit-codec --no-default-features --features alloc --target "$T" --locked
            cargo check -p reliakit-csv --no-default-features --features alloc --target "$T" --locked
            cargo check -p reliakit-health --no-default-features --features alloc --target "$T" --locked
            # Featureless pure-core crates: building for the bare-metal target is
            # itself the no_std proof (no features to disable).
            cargo check -p reliakit-backoff --target "$T" --locked
            cargo check -p reliakit-circuit --target "$T" --locked
            cargo check -p reliakit-ratelimit --target "$T" --locked
            cargo check -p reliakit-timeout --target "$T" --locked
            cargo check -p reliakit-bulkhead --target "$T" --locked
            # These default to `std`, so the default feature must be disabled.
            cargo check -p reliakit-core --no-default-features --target "$T" --locked
            cargo check -p reliakit-json --no-default-features --features canonical --target "$T" --locked
            cargo check -p reliakit-retry --no-default-features --target "$T" --locked
            cargo check -p reliakit-decide --no-default-features --target "$T" --locked
            echo "::endgroup::"
          done

  no-third-party-deps:
    name: Zero dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      # Reliakit's crates must depend only on the standard library and on each
      # other. `cargo metadata` lists every dependency of each workspace member,
      # including dev- and build-dependencies (each carries a `kind`), so this
      # fails if any of them gains a third-party dependency of any kind.
      - name: Assert no third-party dependencies
        run: |
          cargo metadata --format-version 1 --locked \
            | python3 -c '
          import json, sys
          meta = json.load(sys.stdin)
          members = set(meta["workspace_members"])
          offenders = {}
          for pkg in meta["packages"]:
              if pkg["id"] not in members:
                  continue
              # "dependencies" covers normal, dev, and build kinds.
              extern = []
              for d in pkg["dependencies"]:
                  if not d["name"].startswith("reliakit-"):
                      kind = d["kind"] or "normal"
                      extern.append(d["name"] + " (" + kind + ")")
              if extern:
                  offenders[pkg["name"]] = sorted(extern)
          if offenders:
              print("Third-party dependencies found (reliakit must have none):")
              for name in sorted(offenders):
                  print("  " + name + ": " + ", ".join(offenders[name]))
              sys.exit(1)
          print("OK: no third-party dependencies (any kind) across the workspace.")
          '

      # Ground truth: the fully resolved dependency graph (Cargo.lock) must
      # contain only reliakit crates. This catches any third-party package
      # (including a transitive one) that the per-crate manifest scan above
      # cannot see. The umbrella crate is named `reliakit` (no suffix), so the
      # pattern accepts both `reliakit` and `reliakit-*`.
      - name: Assert the lockfile has no third-party packages
        run: |
          bad="$(grep '^name = ' Cargo.lock | grep -vE '^name = "reliakit(-[^"]*)?"$' || true)"
          if [ -n "$bad" ]; then
            echo "Third-party packages found in Cargo.lock (reliakit must have none):"
            echo "$bad"
            exit 1
          fi
          echo "OK: Cargo.lock contains only reliakit / reliakit-* packages."
