name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Verify Cargo.lock is up to date
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust MSRV
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustc +1.85.0 --version
          cargo +1.85.0 --version

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      - name: Check MSRV
        run: cargo +1.85.0 check --workspace --all-features --locked

  no-std:
    name: no_std
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust stable with no_std target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add thumbv7em-none-eabi
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-

      # Check against a real bare-metal target with no std available, so a stray
      # `std` dependency cannot slip through (the host target always has std).
      - name: Check no_std (alloc only, bare-metal target)
        run: |
          cargo check -p reliakit-primitives --no-default-features --features alloc --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-secret --no-default-features --features alloc --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-validate --no-default-features --features alloc --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-collections --no-default-features --features alloc --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-codec --no-default-features --features alloc --target thumbv7em-none-eabi --locked
          # Featureless pure-core crates: building for the bare-metal target is
          # itself the no_std proof (no features to disable).
          cargo check -p reliakit-backoff --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-circuit --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-ratelimit --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-timeout --target thumbv7em-none-eabi --locked
          # These default to `std`, so the default feature must be disabled.
          cargo check -p reliakit-core --no-default-features --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-json --no-default-features --features canonical --target thumbv7em-none-eabi --locked
          cargo check -p reliakit-retry --no-default-features --target thumbv7em-none-eabi --locked

  no-third-party-deps:
    name: Zero dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      # Reliakit's crates must depend only on the standard library and on each
      # other. `cargo metadata` lists every dependency of each workspace member,
      # including dev- and build-dependencies (each carries a `kind`), so this
      # fails if any of them gains a third-party dependency of any kind.
      - name: Assert no third-party dependencies
        run: |
          cargo metadata --format-version 1 --locked \
            | python3 -c '
          import json, sys
          meta = json.load(sys.stdin)
          members = set(meta["workspace_members"])
          offenders = {}
          for pkg in meta["packages"]:
              if pkg["id"] not in members:
                  continue
              # "dependencies" covers normal, dev, and build kinds.
              extern = []
              for d in pkg["dependencies"]:
                  if not d["name"].startswith("reliakit-"):
                      kind = d["kind"] or "normal"
                      extern.append(d["name"] + " (" + kind + ")")
              if extern:
                  offenders[pkg["name"]] = sorted(extern)
          if offenders:
              print("Third-party dependencies found (reliakit must have none):")
              for name in sorted(offenders):
                  print("  " + name + ": " + ", ".join(offenders[name]))
              sys.exit(1)
          print("OK: no third-party dependencies (any kind) across the workspace.")
          '

      # Ground truth: the fully resolved dependency graph (Cargo.lock) must
      # contain only reliakit crates. This catches any third-party package —
      # including a transitive one — that the per-crate manifest scan above
      # cannot see. The umbrella crate is named `reliakit` (no suffix), so the
      # pattern accepts both `reliakit` and `reliakit-*`.
      - name: Assert the lockfile has no third-party packages
        run: |
          bad="$(grep '^name = ' Cargo.lock | grep -vE '^name = "reliakit(-[^"]*)?"$' || true)"
          if [ -n "$bad" ]; then
            echo "Third-party packages found in Cargo.lock (reliakit must have none):"
            echo "$bad"
            exit 1
          fi
          echo "OK: Cargo.lock contains only reliakit / reliakit-* packages."
